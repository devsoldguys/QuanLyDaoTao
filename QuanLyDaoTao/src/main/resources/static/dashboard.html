<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>PTIT Academic - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --ptit-red: #bb0000; --sidebar-bg: #2c3e50; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; height: 100vh; }
    .sidebar { width: 250px; background: var(--sidebar-bg); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
    .menu { list-style: none; padding: 0; margin: 0; }
    .menu li { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .menu li:hover { background: var(--ptit-red); }
    .main-content { flex-grow: 1; padding: 25px; overflow-y: auto; }
    .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="sidebar">
  <div style="padding:25px; text-align:center; font-weight:bold; font-size: 1.2rem;">PTIT ACADEMIC</div>
  <ul class="menu">
    <li onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i> Trang chủ</li>
    <li onclick="location.href='dang-ky.html'"><i class="fa-solid fa-pen"></i> Đăng ký môn học</li>
    <li onclick="location.href='hoc-phi.html'"><i class="fa-solid fa-wallet"></i> Tra cứu học phí</li>
    <li onclick="location.href='ket-qua.html'"><i class="fa-solid fa-graduation-cap"></i> Kết quả học tập</li>
    <li onclick="localStorage.clear(); location.href='login.html'" style="color: #ff9999;"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</li>
  </ul>
</div>
<div class="main-content">
  <h2>Xin chào, <span id="user-name">Đang tải...</span></h2>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
      <h3><i class="fa-solid fa-id-card"></i> Thông tin sinh viên</h3>
      <p>Mã SV: <b id="user-msv">---</b></p>
      <p>Lớp: <b id="user-lop">---</b></p>
      <p>Ngành: <b id="user-nganh">---</b></p>
    </div>
    <div class="card">
      <h3><i class="fa-solid fa-money-bill-wave"></i> Học phí học kỳ này</h3>
      <h2 id="user-hp" style="color:var(--ptit-red)">0 VNĐ</h2>
      <p id="hp-ky">---</p>
    </div>
  </div>
</div>
<script>
  window.onload = function() {
    const maSV = localStorage.getItem('maSVHienTai');
    if(!maSV) { location.href = 'login.html'; return; }

    fetch(`http://localhost:8080/api/sinhvien/${maSV}`)
            .then(res => res.json())
            .then(data => {
              document.getElementById('user-name').innerText = data.hoTen;
              document.getElementById('user-msv').innerText = data.maSV;
              document.getElementById('user-lop').innerText = data.lop;
              document.getElementById('user-nganh').innerText = data.nganh;
            });

    fetch(`http://localhost:8080/api/hoc-phi/${maSV}`)
            .then(res => res.json())
            .then(data => {
              if(data) {
                document.getElementById('user-hp').innerText = data.soTienPhaiNop.toLocaleString() + " VNĐ";
                document.getElementById('hp-ky').innerText = data.hocKy;
              }
            });
  }
</script>
</body>
</html>
