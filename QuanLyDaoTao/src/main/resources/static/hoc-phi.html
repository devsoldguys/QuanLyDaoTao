<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Học phí - PTIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ptit-red: #bb0000; --sidebar-bg: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar-bg); color: white; flex-shrink: 0; }
        .menu li { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main-content { flex-grow: 1; padding: 30px; }
        .card { background: white; border-radius: 8px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="sidebar">
    <div style="padding:25px; text-align:center; font-weight:bold;">PTIT ACADEMIC</div>
    <ul class="menu" style="list-style:none; padding:0;">
        <li onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i> Trang chủ</li>
        <li onclick="location.href='dang-ky.html'"><i class="fa-solid fa-pen"></i> Đăng ký môn học</li>
        <li onclick="location.href='hoc-phi.html'" style="background:var(--ptit-red)"><i class="fa-solid fa-wallet"></i> Tra cứu học phí</li>
        <li onclick="location.href='ket-qua.html'"><i class="fa-solid fa-graduation-cap"></i> Kết quả học tập</li>
    </ul>
</div>
<div class="main-content">
    <div class="card">
        <h2 style="color:var(--ptit-red)"><i class="fa-solid fa-file-invoice-dollar"></i> CHI TIẾT CÔNG NỢ HỌC PHÍ</h2>
        <table>
            <thead>
            <tr>
                <th>Học kỳ</th>
                <th>Số tiền phải nộp</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody id="list-hoc-phi"></tbody>
        </table>
    </div>
</div>
<script>
    window.onload = function() {
        const maSV = localStorage.getItem('maSVHienTai');
        fetch(`http://localhost:8080/api/hoc-phi/${maSV}`)
            .then(res => res.json())
            .then(data => {
                if(data) {
                    document.getElementById('list-hoc-phi').innerHTML = `
                            <tr>
                                <td>${data.hocKy}</td>
                                <td style="color:red; font-weight:bold">${data.soTienPhaiNop.toLocaleString()} VNĐ</td>
                                <td><span style="color:orange">Chưa thanh toán</span></td>
                            </tr>`;
                }
            });
    }
</script>
</body>
</html>
