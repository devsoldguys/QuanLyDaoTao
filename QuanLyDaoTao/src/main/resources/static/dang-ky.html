<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách lớp học - PTIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ptit-red: #bb0000; --sidebar-bg: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar-bg); color: white; flex-shrink: 0; }
        .sidebar-header { padding: 25px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.2); }
        .menu { list-style: none; padding: 0; margin: 0; }
        .menu li { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu li:hover { background: var(--ptit-red); }
        .main-content { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; color: #333; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #555; }
        tr:hover { background-color: #fcfcfc; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">PTIT ACADEMIC</div>
    <ul class="menu">
        <li onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i> Trang chủ</li>
        <li onclick="location.href='dang-ky.html'"><i class="fa-solid fa-pen"></i> Đăng ký môn học</li>
        <li onclick="location.href='hoc-phi.html'"><i class="fa-solid fa-wallet"></i> Tra cứu học phí</li>
        <li onclick="location.href='ket-qua.html'"><i class="fa-solid fa-graduation-cap"></i> Kết quả học tập</li>
        <li onclick="localStorage.clear(); location.href='login.html'" style="color:#ff9999"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</li>
    </ul>
</div>
<div class="main-content">
    <div class="card">
        <h2 style="color:var(--ptit-red); margin-top: 0;">DANH SÁCH LỚP HỌC PHẦN MỞ ĐĂNG KÝ</h2>
        <table>
            <thead>
            <tr>
                <th style="width: 15%;">Mã Môn</th>
                <th style="width: 40%;">Môn học</th>
                <th style="width: 15%;">Nhóm</th>
                <th style="width: 30%;">Giảng Viên</th>
            </tr>
            </thead>
            <tbody id="ds-lop">
            <tr><td colspan="4" style="text-align:center">Đang kết nối Database...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    window.onload = function() {
        // Gọi API lấy dữ liệu thật từ Database
        fetch('http://localhost:8080/api/lop-hoc-phan/all')
            .then(res => res.json())
            .then(data => {
                let html = '';
                if(data.length === 0) {
                    html = '<tr><td colspan="4" style="text-align:center">Không có dữ liệu trong Database</td></tr>';
                } else {
                    data.forEach(item => {
                        html += `<tr>
                                <td><b>${item.maMon}</b></td>
                                <td>${item.tenMon}</td>
                                <td>${item.nhom}</td>
                                <td>${item.giangVien}</td>
                            </tr>`;
                    });
                }
                document.getElementById('ds-lop').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('ds-lop').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Lỗi: Không thể lấy dữ liệu từ Server!</td></tr>';
            });
    };
</script>
</body>
</html>
