<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ff4d4f;
            background-color: #fff;
        }
        .btn-container {
            display: flex;
            gap: 10px;
        }
        .btn-login {
            flex: 1;
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #e04344;
        }
        .btn-register {
            flex: 1;
            background-color: white;
            color: #555;
            border: 1px solid #ccc;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Đăng Nhập</h2>
        <p>Vui lòng điền thông tin để tiếp tục</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Tên đăng nhập (Mã SV)</label>
                <input type="text" id="username" placeholder="Ví dụ: B23DCVT341" required>
            </div>
            
            <div class="input-group">
                <label for="password">Mật khẩu (Số điện thoại)</label>
                <input type="password" id="password" placeholder="Nhập số điện thoại" required>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn-login">Đăng nhập</button>
                <button type="button" class="btn-register">Đăng ký</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {

            event.preventDefault(); 


            const maSV = document.getElementById('username').value;
            const sdt = document.getElementById('password').value;


            const loginData = {
                username: maSV,
                password: sdt
            };


            fetch('http://localhost:8080/api/sinhvien/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(loginData)
            })
            .then(response => response.text())
            .then(result => {
                if (result === "SUCCESS") {

                    localStorage.setItem('maSV_Phuc', maSV);
                    alert("🎉 Đăng nhập thành công! Chào mừng " + maSV);

                    window.location.href = 'dashboard.html';
                } else {
                    alert("❌ Sai Mã sinh viên hoặc Số điện thoại. Vui lòng thử lại!");
                }
            })
            .catch(error => {
                alert("Lỗi kết nối đến Server! Hãy chắc chắn rằng bạn đang bật chạy ứng dụng Java Spring Boot.");
                console.error('Error:', error);
            });
        });
    </script>

</body>
</html>
